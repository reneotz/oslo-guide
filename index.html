<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Top Floor by Oslo Opera — Guest Guide</title>
<meta name="description" content="Guest guidebook for Top Floor by Oslo Opera, Operagata 27, Oslo.">
<meta name="theme-color" content="#2d5128">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icon-192.png">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<style>
@font-face{font-family:'Figtree';src:url('assets/Figtree-Regular.ttf') format('truetype');font-weight:400;font-display:swap}
@font-face{font-family:'Figtree';src:url('assets/Figtree-Bold.ttf') format('truetype');font-weight:700;font-display:swap}
:root{
  --green:#2d5128;--green-2:#3a6635;--green-deep:#1f3a1c;
  --gold:#a8923c;--gold-2:#c9b96a;
  --paper:#f6f4ee;--card:#ffffff;--ink:#20291d;--muted:#68725f;--line:#e5e1d5;
  --radius:18px;--shadow:0 6px 24px rgba(31,42,28,.09);
  --nav-h:calc(62px + env(safe-area-inset-bottom,0px));
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Figtree',system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:16.5px;line-height:1.6}
button{font-family:inherit}
#view{min-height:100vh;padding-bottom:var(--nav-h)}
.wrap{max-width:760px;margin:0 auto;padding:0 18px}

/* ---------- top bar ---------- */
#topbar{position:sticky;top:0;z-index:40;background:rgba(246,244,238,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:10px 12px;padding-top:calc(10px + env(safe-area-inset-top,0px))}
#topbar.hidden{display:none}
#topbar .tb-title{flex:1;font-weight:700;font-size:1.02rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iconbtn{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:12px;border:none;background:transparent;color:var(--ink);cursor:pointer}
.iconbtn:active{background:rgba(45,81,40,.08)}
.iconbtn svg{width:22px;height:22px}

/* ---------- cover / home ---------- */
.cover{position:relative;min-height:100svh;display:flex;flex-direction:column;justify-content:flex-end;color:#fff;isolation:isolate}
.cover picture,.cover img.bg{position:absolute;inset:0;z-index:-2}
.cover img.bg{width:100%;height:100%;object-fit:cover}
.cover::after{content:'';position:absolute;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(20,30,18,.25) 0%,rgba(20,30,18,.08) 40%,rgba(20,30,18,.78) 100%)}
.cover-inner{padding:26px 22px calc(30px + var(--nav-h));max-width:760px;margin:0 auto;width:100%}
.greet{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:7px 16px;font-weight:700;font-size:.95rem;margin-bottom:14px}
.cover h1{font-size:clamp(2rem,6vw,3rem);line-height:1.08;margin:0 0 10px;font-weight:700;letter-spacing:-.02em;text-shadow:0 2px 18px rgba(0,0,0,.35)}
.cover .addr{display:flex;align-items:center;gap:7px;opacity:.92;font-size:.98rem;margin-bottom:20px}
.cover .addr svg{width:17px;height:17px;flex:none}
.staycard{display:flex;gap:1px;background:rgba(255,255,255,.22);border-radius:16px;overflow:hidden;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.25);margin-bottom:22px;max-width:430px}
.staycard>div{flex:1;padding:12px 16px;background:rgba(31,42,28,.55)}
.staycard .lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.09em;opacity:.8}
.staycard .val{font-weight:700;font-size:1.06rem;margin-top:2px}
.staycard .sub{font-size:.8rem;opacity:.8}
.btn-primary{display:inline-flex;align-items:center;gap:10px;background:var(--gold);color:#fff;border:none;border-radius:999px;padding:15px 30px;font-size:1.03rem;font-weight:700;cursor:pointer;box-shadow:0 8px 22px rgba(0,0,0,.28);transition:transform .15s}
.btn-primary:active{transform:scale(.97)}
.btn-primary svg{width:19px;height:19px}

/* ---------- guide grid ---------- */
.pagehead{padding:26px 0 6px}
.pagehead h2{margin:0;font-size:1.65rem;letter-spacing:-.02em}
.pagehead p{margin:6px 0 0;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:16px 0 28px}
@media(min-width:620px){.grid{grid-template-columns:repeat(3,1fr)}}
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 16px 17px;display:flex;flex-direction:column;gap:12px;cursor:pointer;text-align:left;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
.tile:active{transform:scale(.97)}
.tile .ticon{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--green),var(--green-2));display:flex;align-items:center;justify-content:center;color:var(--gold-2)}
.tile .ticon svg{width:23px;height:23px}
.tile .tname{font-weight:700;font-size:1.0rem;line-height:1.25}
.tile .tcount{color:var(--muted);font-size:.82rem;margin-top:-8px}

/* ---------- category topic list ---------- */
.toplist{display:flex;flex-direction:column;gap:10px;padding:14px 0 28px}
.topic-row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 14px;cursor:pointer;box-shadow:var(--shadow);text-align:left;transition:transform .12s}
.topic-row:active{transform:scale(.98)}
.topic-row img{width:56px;height:56px;border-radius:12px;object-fit:cover;flex:none}
.topic-row .ph{width:56px;height:56px;border-radius:12px;flex:none;background:linear-gradient(135deg,#eceadf,#dcd8c8);display:flex;align-items:center;justify-content:center;color:var(--green)}
.topic-row .ph svg{width:24px;height:24px;opacity:.55}
.topic-row .tt{flex:1;font-weight:700;font-size:.99rem;line-height:1.3}
.topic-row .chev{color:var(--muted);flex:none}

/* ---------- topic page ---------- */
.hero{width:100%;max-height:300px;object-fit:cover;border-radius:0 0 22px 22px}
.topic-head{padding:20px 0 4px}
.topic-head .crumb{color:var(--gold);font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.08em}
.topic-head h2{margin:4px 0 0;font-size:1.7rem;line-height:1.15;letter-spacing:-.02em}
.acc{background:var(--card);border:1px solid var(--line);border-radius:16px;margin:12px 0;box-shadow:var(--shadow);overflow:hidden}
.acc>button{width:100%;display:flex;align-items:center;gap:12px;background:none;border:none;padding:16px 18px;font-size:1.06rem;font-weight:700;color:var(--ink);cursor:pointer;text-align:left}
.acc>button .chev{margin-left:auto;transition:transform .25s;color:var(--gold);flex:none}
.acc.open>button .chev{transform:rotate(180deg)}
.acc .body{display:none;padding:2px 18px 18px}
.acc.open .body{display:block}
.prose{overflow-wrap:break-word}
.prose h2,.prose h3{line-height:1.25;margin:1.3em 0 .45em;letter-spacing:-.01em}
.prose h2{font-size:1.22rem}.prose h3{font-size:1.06rem}
.prose p{margin:.55em 0}
.prose ul,.prose ol{margin:.5em 0;padding-left:1.35em}
.prose li{margin:.28em 0}
.prose a{color:var(--green);font-weight:700;text-decoration-color:var(--gold-2)}
.prose img{max-width:100%;border-radius:12px}
.prose table{border-collapse:collapse;width:100%;font-size:.92rem}
.prose td,.prose th{border:1px solid var(--line);padding:7px 9px;vertical-align:top}
.prose blockquote{margin:.8em 0;padding:.2em 1em;border-left:3px solid var(--gold-2);color:var(--muted)}
.topic-actions{display:flex;gap:10px;flex-wrap:wrap;padding:6px 0 30px}
.chip{display:inline-flex;align-items:center;gap:8px;border:1.5px solid var(--green);color:var(--green);background:none;border-radius:999px;padding:9px 18px;font-weight:700;font-size:.92rem;cursor:pointer;text-decoration:none}
.chip svg{width:17px;height:17px}

/* ---------- map ---------- */
#mapbox{height:calc(100svh - var(--nav-h));width:100%}
.leaflet-popup-content{font-family:'Figtree',sans-serif}
.map-pop b{display:block;margin-bottom:4px}
.map-pop a{color:var(--green);font-weight:700}

/* ---------- search ---------- */
.searchbar{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:12px 16px;margin:18px 0 8px;box-shadow:var(--shadow)}
.searchbar svg{width:20px;height:20px;color:var(--muted);flex:none}
.searchbar input{border:none;outline:none;background:none;font:inherit;flex:1;color:var(--ink)}
.sres{display:flex;flex-direction:column;gap:10px;padding:10px 0 30px}
.sres .topic-row .snip{color:var(--muted);font-weight:400;font-size:.85rem;margin-top:3px}
.sres .topic-row .snip mark{background:var(--gold-2);border-radius:3px;padding:0 2px}
.nores{color:var(--muted);text-align:center;padding:30px 0}

/* ---------- bottom nav ---------- */
#tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--green-deep);display:flex;justify-content:center;padding-bottom:env(safe-area-inset-bottom,0px)}
#tabbar button{flex:1;max-width:190px;background:none;border:none;color:#b8c4b0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 8px;font-size:.68rem;font-weight:700;letter-spacing:.04em;cursor:pointer}
#tabbar button svg{width:22px;height:22px}
#tabbar button.active{color:var(--gold-2)}

/* ---------- print ---------- */
#print-root{display:none}
@media print{
  #app,#tabbar,#topbar{display:none!important}
  #print-root{display:block;font-size:11pt}
  #print-root h1{font-size:20pt}
  #print-root h2.pcat{font-size:15pt;border-bottom:2px solid #999;padding-bottom:4px;margin-top:24pt;page-break-after:avoid}
  #print-root h3.ptop{font-size:13pt;margin-top:14pt;page-break-after:avoid}
  #print-root img{max-width:60%;border-radius:6px}
  #print-root a{color:#000;text-decoration:none}
}
.fade{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.offline-note{background:#fdf6e3;border:1px solid var(--gold-2);border-radius:12px;padding:10px 14px;font-size:.88rem;color:#7a6a2f;margin:12px 0}
</style>
</head>
<body>
<div id="app">
  <header id="topbar" class="hidden">
    <button class="iconbtn" id="backbtn" aria-label="Back"></button>
    <div class="tb-title" id="tbtitle"></div>
    <button class="iconbtn" id="sharebtn" aria-label="Share"></button>
    <button class="iconbtn" id="printbtn" aria-label="Print guide"></button>
  </header>
  <main id="view"></main>
  <nav id="tabbar" aria-label="Main navigation"></nav>
</div>
<div id="print-root"></div>
<script src="app.js"></script>
</body>
</html>
